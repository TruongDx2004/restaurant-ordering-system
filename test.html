<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Restaurant WebSocket Tester</title>

<script src="https://cdn.jsdelivr.net/npm/sockjs-client@1/dist/sockjs.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/stompjs@2.3.3/lib/stomp.min.js"></script>

<style>

body{
font-family: Arial;
background:#f4f6f8;
margin:40px;
}

.container{
max-width:900px;
margin:auto;
background:white;
padding:20px;
border-radius:10px;
box-shadow:0 0 10px rgba(0,0,0,0.1);
}

button{
padding:8px 14px;
margin:4px;
cursor:pointer;
}

input{
padding:6px;
margin:4px;
}

#log{
margin-top:20px;
border:1px solid #ddd;
height:300px;
overflow:auto;
padding:10px;
background:#000;
color:#00ff9d;
font-family:monospace;
}

.status{
font-weight:bold;
}

.connected{
color:green;
}

.disconnected{
color:red;
}

</style>
</head>

<body>

<div class="container">

<h2>Restaurant WebSocket Tester</h2>

Status: 
<span id="status" class="status disconnected">Disconnected</span>

<br><br>

<button onclick="connect()">Connect</button>
<button onclick="disconnect()">Disconnect</button>

<hr>

<h3>User</h3>

<input id="username" placeholder="username">
<button onclick="join()">Join</button>

<hr>

<h3>Send Message</h3>

<input id="sender" placeholder="sender">
<input id="content" placeholder="content">

<br>

<button onclick="sendMessage()">Send Message</button>
<button onclick="sendOrder()">Send Order</button>
<button onclick="sendTable()">Send Table Status</button>
<button onclick="sendChat()">Send Chat</button>

<hr>

<h3>Logs</h3>

<div id="log"></div>

</div>

<script>

let stompClient = null;

function log(message){

let logBox = document.getElementById("log");

let p = document.createElement("div");

p.innerText = "[" + new Date().toLocaleTimeString() + "] " + message;

logBox.appendChild(p);

logBox.scrollTop = logBox.scrollHeight;

}

function setStatus(connected){

let status = document.getElementById("status");

if(connected){

status.innerText = "Connected";

status.className = "status connected";

}else{

status.innerText = "Disconnected";

status.className = "status disconnected";

}

}

function connect(){

const socket = new SockJS("http://localhost:8080/ws");

stompClient = Stomp.over(socket);

stompClient.connect({}, function(frame){

setStatus(true);

log("Connected: " + frame);

subscribeTopics();

});

}

function disconnect(){

if(stompClient){

stompClient.disconnect();

}

setStatus(false);

log("Disconnected");

}

function subscribeTopics(){

stompClient.subscribe("/topic/messages", function(msg){

log("MESSAGE -> " + msg.body);

});

stompClient.subscribe("/topic/orders", function(msg){

log("ORDER -> " + msg.body);

});

stompClient.subscribe("/topic/table-status", function(msg){

log("TABLE -> " + msg.body);

});

stompClient.subscribe("/topic/chat", function(msg){

log("CHAT -> " + msg.body);

});

stompClient.subscribe("/topic/users", function(msg){

log("USER EVENT -> " + msg.body);

});

stompClient.subscribe("/topic/payments", function(msg){

log("PAYMENT -> " + msg.body);

});

stompClient.subscribe("/topic/notifications", function(msg){

log("NOTIFICATION -> " + msg.body);

});

}

function join(){

let username = document.getElementById("username").value;

stompClient.send("/app/join", {}, JSON.stringify({

type:"JOIN",

sender:username,

content:username + " joined"

}));

log("JOIN SENT");

}

function sendMessage(){

let sender = document.getElementById("sender").value;

let content = document.getElementById("content").value;

stompClient.send("/app/message", {}, JSON.stringify({

type:"MESSAGE",

sender:sender,

content:content

}));

log("MESSAGE SENT");

}

function sendOrder(){

stompClient.send("/app/order", {}, JSON.stringify({

type:"ORDER",

sender:"customer",

content:"New order from table 5",

tableId:5

}));

log("ORDER SENT");

}

function sendTable(){

stompClient.send("/app/table-status", {}, JSON.stringify({

type:"TABLE_STATUS",

sender:"system",

content:"Table 5 occupied",

tableId:5

}));

log("TABLE STATUS SENT");

}

function sendChat(){

stompClient.send("/app/chat", {}, JSON.stringify({

type:"CHAT",

sender:"table5",

content:"Need more water",

tableId:5

}));

log("CHAT SENT");

}

</script>

</body>
</html>
